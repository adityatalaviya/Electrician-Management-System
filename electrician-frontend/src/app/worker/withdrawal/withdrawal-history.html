<div class="withdrawal-wrapper">

  <div class="withdrawal-header">
    <h2>💸 My Withdrawals</h2>
    <p>Track your advance payments & expenses</p>
  </div>

  <div class="withdrawal-card">

    <!-- FILTER -->
    <div class="filter-section">
      <input
        type="month"
        [(ngModel)]="selectedMonth"
        (change)="filterByMonth()" />

      <button class="reset-btn" (click)="resetFilter()">
        Reset
      </button>
    </div>

    <!-- TOTAL -->
    <div class="summary">
      Total Withdrawn: ₹ {{ totalWithdrawn }}
    </div>

    <!-- EMPTY -->
    <div *ngIf="!filteredList.length" class="empty-state">
      <div class="empty-icon">📭</div>
      <h3>No Withdrawals Found</h3>
      <p>No records for selected month</p>
    </div>

    <!-- TABLE -->
    <table *ngIf="filteredList.length > 0">
      <thead>
        <tr>
          <th>Date</th>
          <th>Amount</th>
          <th>Work Site</th>
          <th>Remarks</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let w of filteredList">
          <td>{{ w.withdrawalDate | date:'dd/MM/yyyy' }}</td>
          <td class="amount">₹ {{ w.amount }}</td>
          <td>{{ w.workDetails?.location }}</td>
          <td>{{ w.remarks || '-' }}</td>
        </tr>
      </tbody>
    </table>

  </div>

</div>
