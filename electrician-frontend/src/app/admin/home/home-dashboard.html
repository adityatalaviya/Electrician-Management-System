<div class="dashboard">

  <h2>Admin Dashboard</h2>

  <div class="cards">

    <div class="card blue">
      <h3>Total Electricians</h3>
      <p>{{ totalElectricians }}</p>
    </div>

    <div class="card green">
      <h3>Active Electricians</h3>
      <p>{{ activeElectricians }}</p>
    </div>

    <div class="card purple">
      <h3>3 Month Plans</h3>
      <p>{{ threeMonthPlans }}</p>
    </div>

    <div class="card orange">
      <h3>6 Month Plans</h3>
      <p>{{ sixMonthPlans }}</p>
    </div>

    <div class="card red">
      <h3>12 Month Plans</h3>
      <p>{{ twelveMonthPlans }}</p>
    </div>

    <div class="card dark">
      <h3>Total Revenue</h3>
      <p>₹ {{ totalRevenue }}</p>
    </div>

  </div>

</div>
