  <div class="admin-layout">

    <aside class="sidebar">
      <h2>⚡ Admin Panel</h2>

      <nav>

        <!-- Dashboard -->
        <a routerLink="/admin"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }">
          Dashboard
        </a>

        <!-- Electrician List -->
        <a routerLink="electricians"
          routerLinkActive="active">
          View Electricians
        </a>

        <!-- Add Electrician -->
        <a routerLink="add-electrician"
          routerLinkActive="active">
          Add Electrician
        </a>

      </nav>

      <button class="logout-btn" (click)="logout()">Logout</button>
    </aside>

    <main class="content">
      <router-outlet></router-outlet>
    </main>

  </div>
