<div class="add-page">

  <div class="glass-card">

    <h2>⚡ Add Electrician</h2>
    <p class="subtitle">Create new electrician account</p>

    <form #f="ngForm" (ngSubmit)="submit(f)">

      <!-- NAME -->
      <div class="floating-group">
        <input
          type="text"
          name="name"
          [(ngModel)]="electrician.name"
          required
          minlength="3"
          placeholder=" "
        />
        <label>Name</label>
      </div>

      <!-- PHONE -->
      <div class="floating-group">
        <input
          type="text"
          name="phone"
          [(ngModel)]="electrician.phone"
          required
          pattern="[0-9]{10}"
          placeholder=" "
        />
        <label>Phone Number</label>
      </div>

      <button type="submit" class="submit-btn">
        Create Electrician
      </button>

    </form>

  </div>

</div>
